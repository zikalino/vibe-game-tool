<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="github-client-id" content="Ov23liMQK9RH5eiQli1H">
  <meta name="github-token-exchange-url" content="/api/github/oauth/access_token">
  <meta name="portal-url" content="/portal">
  <title>Tile Water Sandbox</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="layout">
    <section class="panel">
      <div class="mode-controls">
        <button id="playBtn" type="button" class="play-btn">&#9654; Play</button>
        <button id="editBtn" type="button" class="edit-btn hidden">&#9998; Edit</button>
      </div>
      <button id="githubAuthBtn" type="button" class="github-auth-btn">Authenticate with GitHub</button>
      <div class="tick-controls">
        <label for="tickIntervalSelect">Tick interval</label>
        <select id="tickIntervalSelect" aria-label="Tick interval">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x (default)</option>
          <option value="2">2x (previous speed)</option>
          <option value="3">3x</option>
          <option value="4">4x</option>
        </select>
      </div>
      <p id="githubAuthStatus" class="github-auth-status">GitHub: Not connected.</p>
      <div class="tools" id="tools" aria-label="Build tools">
        <button class="tool is-active" data-tool="stone" title="Stone [1]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
        <button class="tool" data-tool="soil" title="Soil [2]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
        <button class="tool" data-tool="water" title="Water [3]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
        <button class="tool" data-tool="rock" title="Rock [4]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
        <button class="tool" data-tool="monsterH" title="Monster ↔ [5]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
        <button class="tool" data-tool="monsterV" title="Monster ↕ [6]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
        <button class="tool" data-tool="monsterWander" title="Monster ? [7]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
        <button class="tool" data-tool="diamond" title="Diamond [8]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
        <button class="tool" data-tool="lava" title="Lava [9]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
        <button class="tool" data-tool="erase" title="Erase [0]"><canvas class="tool-preview" width="32" height="32" aria-hidden="true"></canvas></button>
      </div>

    </section>
    <section class="game-wrap">
      <button id="exitPlayBtn" class="exit-play-btn hidden" type="button" aria-label="Exit play mode">Exit play</button>
      <div class="map-resize">
        <div id="edgeControls" class="edge-controls" aria-label="Map expand controls">
          <div class="edge-controls-row edge-controls-top">
            <button type="button" data-expand-edge="top" data-expand-amount="1">+1 row</button>
            <button type="button" data-expand-edge="top" data-expand-amount="5">+5 rows</button>
            <button type="button" data-expand-edge="top" data-expand-amount="10">+10 rows</button>
          </div>
          <div class="edge-controls-row edge-controls-right">
            <button type="button" data-expand-edge="right" data-expand-amount="1">+1 col</button>
            <button type="button" data-expand-edge="right" data-expand-amount="5">+5 cols</button>
            <button type="button" data-expand-edge="right" data-expand-amount="10">+10 cols</button>
          </div>
          <div class="edge-controls-row edge-controls-bottom">
            <button type="button" data-expand-edge="bottom" data-expand-amount="1">+1 row</button>
            <button type="button" data-expand-edge="bottom" data-expand-amount="5">+5 rows</button>
            <button type="button" data-expand-edge="bottom" data-expand-amount="10">+10 rows</button>
          </div>
          <div class="edge-controls-row edge-controls-left">
            <button type="button" data-expand-edge="left" data-expand-amount="1">+1 col</button>
            <button type="button" data-expand-edge="left" data-expand-amount="5">+5 cols</button>
            <button type="button" data-expand-edge="left" data-expand-amount="10">+10 cols</button>
          </div>
        </div>
        <canvas id="game" width="768" height="512" aria-label="Tile game canvas"></canvas>
      </div>
    </section>
  </main>

  <section class="overlay hidden" id="winOverlay" aria-live="polite" aria-modal="true" role="dialog">
    <div class="overlay-card">
      <h2>You Win</h2>
      <p>You reached the goal after completing the objective.</p>
      <button id="playAgainBtn" type="button">Play Again</button>
    </div>
  </section>

  <div id="pixelEditor" class="pixel-editor-overlay hidden" role="dialog" aria-modal="true" aria-label="Tile pixel editor">
    <div class="pixel-editor-card">
      <h2 class="pixel-editor-title" id="pixelEditorTitle">Edit Tile</h2>
      <div class="pixel-editor-body">
        <div class="pixel-editor-toolbox" id="pixelEditorToolbox" aria-label="Drawing tools">
          <button class="px-tool" data-px-tool="select" title="Select area" type="button" aria-pressed="false">⬚</button>
          <button class="px-tool" data-px-tool="draw" title="Draw (pencil)" type="button" aria-pressed="false">✏</button>
          <button class="px-tool" data-px-tool="fill" title="Fill (bucket)" type="button" aria-pressed="false">⬤</button>
          <button class="px-tool" data-px-tool="picker" title="Color Picker" type="button" aria-pressed="false">⊕</button>
          <button class="px-tool" data-px-tool="line" title="Line" type="button" aria-pressed="false">╱</button>
          <button class="px-tool" data-px-tool="rect" title="Rectangle" type="button" aria-pressed="false">▭</button>
          <button class="px-tool" data-px-tool="circle" title="Circle" type="button" aria-pressed="false">◯</button>
          <div class="px-tool-separator"></div>
          <div class="px-pen-size-label">Size</div>
          <button class="px-pen-size" data-pen-size="1" title="Pen size 1px" type="button" aria-pressed="false">1</button>
          <button class="px-pen-size" data-pen-size="2" title="Pen size 2px" type="button" aria-pressed="false">2</button>
          <button class="px-pen-size" data-pen-size="3" title="Pen size 3px" type="button" aria-pressed="false">3</button>
          <button class="px-pen-size" data-pen-size="4" title="Pen size 4px" type="button" aria-pressed="false">4</button>
          <button class="px-pen-size" data-pen-size="5" title="Pen size 5px" type="button" aria-pressed="false">5</button>
        </div>
        <canvas id="pixelEditorCanvas" class="pixel-editor-canvas" width="320" height="320"></canvas>
        <div class="pixel-editor-sidebar">
          <div class="pixel-editor-palette" id="pixelEditorPalette" aria-label="Color palette"></div>
          <div class="pixel-editor-current-color-label">Current color</div>
          <div class="pixel-editor-current-color" id="pixelEditorCurrentColor"></div>
          <label class="pixel-editor-custom-label">
            Custom:
            <input type="color" id="pixelEditorCustomColor" value="#7f868d">
          </label>
        </div>
      </div>
      <div class="pixel-editor-actions">
        <button id="pixelEditorReset" type="button" class="pixel-editor-reset-btn">Reset</button>
        <button id="pixelEditorCancel" type="button" class="pixel-editor-cancel-btn">Cancel</button>
        <button id="pixelEditorSave" type="button" class="pixel-editor-save-btn">Save</button>
      </div>
    </div>
  </div>

  <div id="touchControls" class="touch-controls hidden" aria-label="Touch game controls">
    <div class="touch-dpad">
      <button class="touch-btn" data-touch-action="up" aria-label="Move up" type="button">▲</button>
      <div class="touch-dpad-row">
        <button class="touch-btn" data-touch-action="left" aria-label="Move left" type="button">◀</button>
        <div class="touch-dpad-center"></div>
        <button class="touch-btn" data-touch-action="right" aria-label="Move right" type="button">▶</button>
      </div>
      <button class="touch-btn" data-touch-action="down" aria-label="Move down" type="button">▼</button>
    </div>
    <div class="touch-actions">
      <button class="touch-btn" data-touch-action="dig" aria-label="Break soil" type="button">⛏</button>
      <button class="touch-btn" data-touch-action="pour" aria-label="Pour water" type="button">💧</button>
      <button class="touch-btn" data-touch-action="reset" aria-label="Reset game" type="button">↺</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
