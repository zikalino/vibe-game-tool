name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure backend URL for GitHub Pages
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -n "${BACKEND_URL}" ]; then
            BACKEND_URL="${BACKEND_URL%/}"
            TOKEN_PATH="/api/github/oauth/access_token"
            sed -i "s|content=\"${TOKEN_PATH}\"|content=\"${BACKEND_URL}${TOKEN_PATH}\"|g" index.html
            echo "Token exchange URL configured: ${BACKEND_URL}${TOKEN_PATH}"
            PORTAL_PATH="/portal"
            sed -i "s|content=\"${PORTAL_PATH}\"|content=\"${BACKEND_URL}${PORTAL_PATH}\"|g" index.html
            echo "Portal URL configured: ${BACKEND_URL}${PORTAL_PATH}"
          else
            echo "WARNING: BACKEND_URL secret is not set. GitHub auth token exchange will fail when served from GitHub Pages because the relative URL /api/github/oauth/access_token cannot reach the backend."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
