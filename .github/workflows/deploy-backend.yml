name: Deploy Backend to Ubuntu VM

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Capture the host key so StrictHostKeyChecking passes; retry until SSH is ready
          SERVER_IP="${{ secrets.DOMAIN }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          SSH_READY=0
          for i in $(seq 1 20); do
            if ssh-keyscan -H "${SERVER_IP}" >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "SSH is ready"
              SSH_READY=1
              break
            fi
            echo "  Attempt ${i}/20: SSH not yet available, retrying in 10s..."
            sleep 10
          done
          if [ "${SSH_READY}" -eq 0 ]; then
            echo "ERROR: SSH did not become available on ${SERVER_IP} within timeout (200 seconds)"
            exit 1
          fi

      - name: Clone or update repository on server
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DOMAIN }} bash << 'ENDSSH'
            set -euo pipefail
            REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
            REPO_DIR="/opt/vibe-game-tool"
            if [ -d "${REPO_DIR}/.git" ]; then
              echo "→ Pulling latest changes..."
              git -C "${REPO_DIR}" pull --ff-only
            else
              echo "→ Cloning repository..."
              git clone "${REPO_URL}" "${REPO_DIR}"
            fi
          ENDSSH

      - name: Upload .env configuration to server
        env:
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          # Write secrets to a local temp file then transfer via scp to avoid
          # exposing values in the remote command string or process list.
          TMPENV=$(mktemp)
          trap 'rm -f "${TMPENV}"' EXIT
          {
            printf 'GH_CLIENT_ID=%s\n'     "${GH_CLIENT_ID}"
            printf 'GH_CLIENT_SECRET=%s\n' "${GH_CLIENT_SECRET}"
            printf 'JWT_SECRET=%s\n'       "${JWT_SECRET}"
            printf 'DOMAIN=%s\n'           "${DOMAIN}"
            printf 'DATABASE_URL=%s\n'     "sqlite:///app/data/app.db"
          } > "${TMPENV}"
          scp -i ~/.ssh/deploy_key "${TMPENV}" \
            root@${{ secrets.DOMAIN }}:/opt/vibe-game-tool/deploy/.env

      - name: Run deploy script on server
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DOMAIN }} \
            "bash /opt/vibe-game-tool/deploy/deploy.sh"
